# ================================================================
# Trivy Configuration — ${{ values.client_name }}
# Generated by Opt IT Backstage — DO NOT EDIT MANUALLY
# ================================================================

# Severity levels to report
severity:
  - CRITICAL
  - HIGH
${% if values.include_medium_severity %}
  - MEDIUM
${% endif %}

# Exit code when vulnerabilities are found
# 0 = always pass (report only), 1 = fail on findings
exit-code: ${{ values.trivy_exit_code }}

# Ignore unfixed vulnerabilities
ignore-unfixed: ${{ values.ignore_unfixed }}

# Output format: table, json, sarif, cyclonedx
format: table

# Scan types
scanners:
  - vuln
  - secret
  - misconfig

# Cache directory
cache:
  dir: /tmp/trivy-cache
