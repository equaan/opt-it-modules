# ================================================================
# ${{ values.client_name }} — OWASP Dependency Check
# Generated by Opt IT Backstage — DO NOT EDIT MANUALLY
#
# Scans project dependencies for known CVEs using the NVD database.
# ================================================================

name: OWASP Dependency Check

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 3 * * 1'  # Every Monday at 3am UTC

jobs:
  dependency-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: '${{ values.client_name }}'
          path: '.'
          format: 'HTML,SARIF'
          out: 'reports'
          args: >
            --enableRetired
            --failOnCVSS ${{ values.owasp_fail_cvss }}
            --suppression security/owasp/suppressions.xml

      - name: Upload OWASP results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: reports/dependency-check-report.sarif

      - name: Upload HTML report as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-dependency-check-report
          path: reports/dependency-check-report.html
          retention-days: 30
