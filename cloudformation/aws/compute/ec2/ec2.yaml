AWSTemplateFormatVersion: "2010-09-09"
Description: EC2 instance stack for ${{ values.client_name }}

Parameters:
  ClientName:
    Type: String
    Default: "${{ values.client_name }}"

  InstanceType:
    Type: String
    Default: "${{ values.ec2_instance_type }}"
    AllowedValues:
      - t2.micro
      - t3.micro
      - t3.small

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC to launch the instance in

  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Subnet to launch the instance in

Resources:
  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub "Security group for ${ClientName} EC2"
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub "${ClientName}-ec2-sg"

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      SubnetId: !Ref SubnetId
      SecurityGroupIds:
        - !Ref EC2SecurityGroup
      Tags:
        - Key: Name
          Value: !Sub "${ClientName}-ec2"
        - Key: client
          Value: !Ref ClientName

Outputs:
  InstanceId:
    Description: EC2 Instance ID
    Value: !Ref EC2Instance
