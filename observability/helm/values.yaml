# ================================================================
# ${{ values.client_name }} — Observability Helm Values
# Generated by Opt IT Backstage — DO NOT EDIT MANUALLY
# ================================================================

global:
  labels:
    client: ${{ values.client_name }}
    environment: ${{ values.environment }}
    managed-by: opt-it-backstage

prometheus:
  server:
    retention: "${{ values.retention_days }}d"
    global:
      scrape_interval: ${{ values.scrape_interval }}
      external_labels:
        client: ${{ values.client_name }}
        environment: ${{ values.environment }}
  alertmanager:
    enabled: true

grafana:
  adminPassword: "${{ values.grafana_admin_password }}"
  persistence:
    enabled: true
    size: 5Gi
  service:
    port: ${{ values.grafana_port }}
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          url: http://{{ .Release.Name }}-prometheus-server
          isDefault: true
