# ================================================================
# ${{ values.client_name }} — Grafana Configuration
# Generated by Opt IT Backstage — DO NOT EDIT MANUALLY
# ================================================================

[server]
root_url = http://localhost:${{ values.grafana_port }}

[security]
admin_user     = admin
admin_password = ${{ values.grafana_admin_password }}
# Change this password immediately after first login

[auth.anonymous]
enabled = false

[users]
allow_sign_up = false

[alerting]
enabled = true

[smtp]
${% if values.alert_email %}
enabled  = true
host     = smtp.gmail.com:587
from_address = alerts@${{ values.client_name }}.example.com
${% else %}
enabled  = false
${% endif %}

[log]
mode  = console
level = info
