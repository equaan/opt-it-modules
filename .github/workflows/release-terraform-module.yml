name: Release Terraform Module

on:
  workflow_dispatch:
    inputs:
      module_name:
        description: 'Module name (e.g. terraform-aws-vpc)'
        required: true
        type: string
      version:
        description: 'Version to release (e.g. 1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  tag-and-release:
    name: Tag and Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Validate version format
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "ERROR: version '$VERSION' is not a valid semver string (expected X.Y.Z)"
            exit 1
          fi

      - name: Create and push tag
        run: |
          TAG="${{ github.event.inputs.module_name }}-v${{ github.event.inputs.version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "ERROR: tag '$TAG' already exists. Delete the existing tag before re-releasing."
            exit 1
          fi
          git tag "$TAG"
          git push origin "$TAG"

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = `${{ github.event.inputs.module_name }}-v${{ github.event.inputs.version }}`;
            try {
              await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag,
                name: tag,
                body: `Release of **${{ github.event.inputs.module_name }}** at version **v${{ github.event.inputs.version }}**.`,
                draft: false,
                prerelease: false,
              });
            } catch (error) {
              if (error.status === 422) {
                core.setFailed(`A GitHub Release for tag '${tag}' already exists.`);
              } else {
                throw error;
              }
            }
