# ================================================================
# ${{ values.client_name }} — Horizontal Pod Autoscaler
# Generated by Opt IT Backstage — DO NOT EDIT MANUALLY
# ================================================================

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ${{ values.client_name }}-hpa
  namespace: ${{ values.k8s_namespace }}
  labels:
    app: ${{ values.client_name }}
    managed-by: opt-it-backstage
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ${{ values.client_name }}-app
  minReplicas: ${{ values.min_replicas }}
  maxReplicas: ${{ values.max_replicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: ${{ values.cpu_target_utilization }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
