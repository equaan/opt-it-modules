# ================================================================
# ${{ values.client_name }} — Kubernetes Ingress
# Generated by Opt IT Backstage — DO NOT EDIT MANUALLY
# ================================================================

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ${{ values.client_name }}-ingress
  namespace: ${{ values.k8s_namespace }}
  labels:
    app: ${{ values.client_name }}
    managed-by: opt-it-backstage
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - ${{ values.domain }}
      secretName: ${{ values.client_name }}-tls
  rules:
    - host: ${{ values.domain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ${{ values.client_name }}-svc
                port:
                  number: 80
