# ================================================================
# ${{ values.client_name }} — Docker Compose (Local Development)
# Generated by Opt IT Backstage — DO NOT EDIT MANUALLY
#
# Usage:
#   docker compose up -d
#   docker compose logs -f app
#   docker compose down
# ================================================================

version: "3.8"

networks:
  app-network:
    driver: bridge

volumes:
  db-data:

services:

  app:
    build:
      context: ../..
      dockerfile: containers/dockerfiles/Dockerfile.${{ values.language }}
    container_name: ${{ values.client_name }}-app
    restart: unless-stopped
    networks:
      - app-network
    ports:
      - "${{ values.app_port }}:${{ values.app_port }}"
    environment:
      NODE_ENV: development
      PORT: "${{ values.app_port }}"
      DATABASE_URL: "${{ values.db_connection_string }}"
    depends_on:
      db:
        condition: service_healthy
    labels:
      client: ${{ values.client_name }}
      environment: local
      managed-by: opt-it-backstage

${% if values.include_database %}
  db:
    image: ${% if values.db_engine == 'postgres' %}postgres:15-alpine${% else %}mysql:8.0${% endif %}
    container_name: ${{ values.client_name }}-db
    restart: unless-stopped
    networks:
      - app-network
    environment:
${% if values.db_engine == 'postgres' %}
      POSTGRES_DB: ${{ values.db_name }}
      POSTGRES_USER: ${{ values.db_user }}
      POSTGRES_PASSWORD: ${{ values.db_password }}
${% else %}
      MYSQL_DATABASE: ${{ values.db_name }}
      MYSQL_USER: ${{ values.db_user }}
      MYSQL_PASSWORD: ${{ values.db_password }}
      MYSQL_ROOT_PASSWORD: ${{ values.db_password }}
${% endif %}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
${% if values.db_engine == 'postgres' %}
      test: ["CMD-SHELL", "pg_isready -U ${{ values.db_user }} -d ${{ values.db_name }}"]
${% else %}
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
${% endif %}
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      client: ${{ values.client_name }}
      managed-by: opt-it-backstage
${% endif %}

${% if values.include_redis %}
  redis:
    image: redis:7-alpine
    container_name: ${{ values.client_name }}-redis
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      client: ${{ values.client_name }}
      managed-by: opt-it-backstage
${% endif %}
