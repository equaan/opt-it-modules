# ================================================================
# ${{ values.client_name }} — Helm Default Values
# Generated by Opt IT Backstage — DO NOT EDIT MANUALLY
#
# Override these values per environment:
#   helm install ${{ values.client_name }} . -f values.prod.yaml
# ================================================================

replicaCount: ${{ values.initial_replicas }}

image:
  repository: ${{ values.container_registry }}/${{ values.client_name }}
  pullPolicy: Always
  tag: "latest"

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 80
  targetPort: ${{ values.app_port }}

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: ${{ values.domain }}
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: ${{ values.client_name }}-tls
      hosts:
        - ${{ values.domain }}

resources:
  requests:
    cpu: ${{ values.cpu_request }}
    memory: ${{ values.memory_request }}
  limits:
    cpu: ${{ values.cpu_limit }}
    memory: ${{ values.memory_limit }}

autoscaling:
  enabled: true
  minReplicas: ${{ values.min_replicas }}
  maxReplicas: ${{ values.max_replicas }}
  targetCPUUtilizationPercentage: ${{ values.cpu_target_utilization }}

probes:
  liveness:
    path: ${{ values.health_check_path }}
    initialDelaySeconds: 30
  readiness:
    path: ${{ values.health_check_path }}
    initialDelaySeconds: 10

env:
  NODE_ENV: ${{ values.environment }}
  PORT: "${{ values.app_port }}"

namespace: ${{ values.k8s_namespace }}
