name: 'Terraform Deploy'

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    name: 'Terraform Apply'
    runs-on: ubuntu-latest
    
    env:
      # Backstage replaces this string with the value from the form
      AWS_REGION: "${{ values.aws_region }}"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # You can hardcode your company's deployment IAM role here
          role-to-assume: arn:aws:iam::123456789012:role/BackstageDeployRole
          
          # This syntax safely passes the region to GitHub Actions
          aws-region: ${{ '${{ env.AWS_REGION }}' }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan -input=false

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false
