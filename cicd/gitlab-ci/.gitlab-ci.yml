# ================================================================
# ${{ values.client_name }} — GitLab CI Pipeline
# Generated by Opt IT Backstage — DO NOT EDIT MANUALLY
# ================================================================

stages:
  - build
  - test
  - deploy

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"

# ── BUILD ────────────────────────────────────────────────────────

build:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  script:
    - docker build -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA .
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA
  only:
    - main
    - develop
    - merge_requests

# ── TEST ─────────────────────────────────────────────────────────

test:unit:
  stage: test
  image: node:20-alpine
  script:
    - npm ci
    - npm test
  coverage: '/Lines\s*:\s*(\d+\.?\d*)%/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
  only:
    - main
    - develop
    - merge_requests

test:lint:
  stage: test
  image: node:20-alpine
  script:
    - npm ci
    - npm run lint
  only:
    - main
    - develop
    - merge_requests

# ── DEPLOY ───────────────────────────────────────────────────────

deploy:staging:
  stage: deploy
  image: alpine:latest
  environment:
    name: staging
    url: https://staging.${{ values.client_name }}.example.com
  script:
    - echo "Deploy to staging"
    # Add your deployment commands here
    # Example: kubectl set image deployment/app app=$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA
  only:
    - develop

deploy:production:
  stage: deploy
  image: alpine:latest
  environment:
    name: production
    url: https://${{ values.client_name }}.example.com
  script:
    - echo "Deploy to production"
    # Add your deployment commands here
  when: manual  # requires manual approval for production
  only:
    - main
